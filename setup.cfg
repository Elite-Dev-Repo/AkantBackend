[flake8]
max-line-length = 110
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    staticfiles,
    htmlcov
ignore = E501, W503
per-file-ignores =
    */migrations/*: F401, E501
    tests/*: S101

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */admin.py
    manage.py
    config/wsgi.py
    config/celery.py

[coverage:report]
show_missing = True
skip_covered = False
precision = 2
